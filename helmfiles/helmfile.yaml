repositories:
  - name: prometheus
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:
  - name: prometheus
    namespace: prometheus
    chart: prometheus
    version:
    values:
      - ./prometheus/values.yaml.gotmpl

  - name: grafana
    namespace: grafana
    chart: grafana
    version:
    values:
      - ./grafana/values.yaml.gotmpl

